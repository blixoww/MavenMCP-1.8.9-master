# .github/workflows/release.yml

name: Build & Release Auto

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Java 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Build avec Maven
        run: mvn package -DskipTests

      # Zippe le dossier test_natives/windows en natives.zip
      - name: Zipper les natives
        run: zip -r natives.zip test_natives/windows/

      - name: Generer le tag
        id: tag
        run: |
          TAG="build-$(date +'%Y%m%d-%H%M')-${GITHUB_SHA::7}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Creer la Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: "Mise a jour automatique"
          files: |
            target/MCP-1.8.9-jar-with-dependencies.jar
            natives.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}








